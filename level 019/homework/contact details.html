<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>pizza form</h1>
    <p>personal info</p>
    <label for="fn">First name: </label><input type="text" id="fn"><br>
    <label for="ln">Last name: </label><input type="text" id="ln"><br>
    <label for="p">Phone: </label><input type="text" id="p"><br>

    <P>pizza</P>
    <p>size:</p>
    <input type="radio" name="r1" id="s"><label for="s">small</label><br>
    <input type="radio" name="r1" id="m"><label for="m">medium</label><br>
    <input type="radio" name="r1" id="l"><label for="l">large</label><br>

    <p>Toppings (check all that apply):</p>
    <input type="checkbox" id="EC"><label for="EC">Extra Cheese</label>
    <input type="checkbox" id="P"><label for="P">Pepperoni</label>
    <input type="checkbox" id="S"><label for="S">Sausage</label>
    <br>
    <input type="checkbox" id="M"><label for="M">Mushrooms</label>
    <input type="checkbox" id="BO"><label for="BO">Black Olives</label>
    <input type="checkbox" id="GP"><label for="GP">Green Peppers</label>
    <br>
    <input type="checkbox" id="T"><label for="T">Tomatos</label>
    <input type="checkbox" id="O"><label for="O">Onions</label>
    <input type="checkbox" id="A"><label for="A">Anchovies</label>
    <br>
    <button>Enter my information</button><br>
    <a href="">HTML valid!</a>

</body>

</html>
