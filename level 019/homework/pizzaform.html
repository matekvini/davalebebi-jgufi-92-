<html>


<title>Pizza Form</title>
</head>

<body>

    <h1>Pizza Form</h1>

    <form action="#" method="post">

        <p>Personal Info</p>

        First Name: <input type="text" name="first_name">
        <br><br>

        Last Name: <input type="text" name="last_name">
        <br><br>

        Phone: <input type="text" name="phone">

        <hr>
        <p>Pizza</p>

        Size:<br>
        <input type="radio" name="size" value="small"> Small<br>
        <input type="radio" name="size" value="medium"> Medium<br>
        <input type="radio" name="size" value="large"> Large<br>

        <br>

        Toppings (check all that apply):<br>

        <input type="checkbox" name="toppings" value="extra-cheese"> Extra Cheese
        <br> <input type="checkbox" name="toppings" value="pepperoni"> Pepperoni
        <br>
        <input type="checkbox" name="toppings" value="sausage"> Sausage
        <br>

        <input type="checkbox" name="toppings" value="mushrooms"> Mushrooms
        <br>
        <input type="checkbox" name="toppings" value="black-olives"> Black Olives
        <br>
        <input type="checkbox" name="toppings" value="green-peppers"> Green Peppers
        <br>
        <br>
        <input type="checkbox" name="toppings" value="tomatos"> Tomatos
        <br>
        <input type="checkbox" name="toppings" value="onions"> Onions
        <br>
        <input type="checkbox" name="toppings" value="anchovies"> Anchovies

        <br><br>

        <input type="submit" value="Enter my information">

    </form>

    <br><br>



</body>

</html>
